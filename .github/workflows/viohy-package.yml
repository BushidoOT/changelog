name: VIOHY Paket 9 Test ve ZIP

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Kaynaklari al
        uses: actions/checkout@v4

      - name: PHP 8.3 kur
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: PHP sozdizimi kontrolu
        run: php -l VIOHY-GUNCELLE.php

      - name: Paket dosyalarini kontrol et
        run: |
          test -f viohy-package/assets/viohy-logo.svg
          test -f viohy-package/assets/viohy-mark.svg
          test -f viohy-package/assets/viohy-brand.css
          test -f viohy-package/assets/viohy-ui.js
          test -f KURULUM.txt
          ! grep -R "BioAkış Normal Hosting Edition" viohy-package || exit 1

      - name: ZIP olustur
        run: |
          zip -r VIOHY-Paket-9-Modern-FTP.zip \
            VIOHY-GUNCELLE.php \
            viohy-package \
            KURULUM.txt \
            PAKET-9-KONTROL-LISTESI.txt

      - name: ZIP artefaktini yukle
        uses: actions/upload-artifact@v4
        with:
          name: VIOHY-Paket-9-Modern-FTP
          path: VIOHY-Paket-9-Modern-FTP.zip
          if-no-files-found: error
          retention-days: 30
